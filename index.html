<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BookMyShow</title>
    <link rel="stylesheet" href="./styler.css" />
  </head>
  <body>
    <header>
      <div class="head">
        <div class="logo">
          <div class="left">
            <h1>BookMyShow</h1>
          </div>
          <div class="right">
            <button>Movies</button>
            <button>Events</button>
            <button>Sports</button>
            <button>More</button>
          </div>
        </div>
        <div class="search">
          <input
            type="text"
            class="searching"
            placeholder="search for movies, events, or sports"
          />
          <button>Search</button>
        </div>
      </div>
    </header>
    <main>
      <div class="hero">
        <h2>Experience the best Movies and Events</h2>
        <button>Book Now</button>
      </div>
      <div class="mover">
        <h2>Popular Movies</h2>
      </div>
      <div class="movie">
        <div class="card">
          <img src="./img/img1.avif" alt="" class="images" />
          <h3>Singham</h3>
        </div>
        <div class="card">
          <img src="./img/img2.avif" alt="" class="images" />
          <h3>Bhool Bhulaiyaa</h3>
        </div>
        <div class="card">
          <img src="./img/img3.avif" alt="" class="images" />
          <h3>Venom</h3>
        </div>
        <div class="card">
          <img src="./img/img4.avif" alt="" class="images" />
          <h3>Vicky Vidya ka woh wala video</h3>
        </div>
        <div class="card">
          <img src="./img/img5.avif" alt="" class="images" />
          <h3>Jigra</h3>
        </div>
        <div class="card">
          <img src="./img/img6.avif" alt="" class="images" />
          <h3>Bandaa singh Choudhary</h3>
        </div>
        <div class="card">
          <img src="./img/img7.avif" alt="" class="images" />
          <h3>Amaran</h3>
        </div>
        <div class="card">
          <img src="./img/img8.avif" alt="" class="images" />
          <h3>The wild Robot</h3>
        </div>
      </div>
    </main>
    <div class="bot">
      <img src="./img/bottom.avif" alt="" />
    </div>
  </body>
</html>
